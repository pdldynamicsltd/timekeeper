# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - timekeeper-pdld

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Restore NuGet packages
        run: dotnet restore CadentManagement.Web.sln

      - name: Install yarn and gulp globally
        run: |
          npm install --global yarn
          npm install --global gulp

      - name: Build frontend assets
        working-directory: src/CadentManagement.Web.Mvc
        run: npm run build

      - name: Build with dotnet
        run: dotnet build CadentManagement.Web.sln --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish src/CadentManagement.Web.Mvc/CadentManagement.Web.Mvc.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp --no-restore

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BABA014087F64E3C88F60471B2846974 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_53D38DADBE8D493AA6D25E63A8C92EBF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3444DE3F2FF04A71B4E0D6440C2CA5A0 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'timekeeper-pdld'
          slot-name: 'Production'
          package: .
          